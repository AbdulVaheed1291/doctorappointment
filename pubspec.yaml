name: doctorappointment
description: "A new Flutter project."

# Prevents accidental publication to pub.dev
publish_to: 'none'

# Versioning and build details
version: 1.0.0+1

# Dart SDK compatibility
environment:
  sdk: '>=3.3.4 <4.0.0'

# Main dependencies
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_bloc: ^8.1.5
  firebase_auth: ^4.19.5
  firebase_core: ^2.31.0
  shared_preferences: ^2.2.3
  firebase_storage: ^11.7.5
  cloud_firestore: ^4.17.4
  url_launcher: ^6.3.0
  intl: ^0.17.0







# Development dependencies
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

# Flutter-specific configurations
flutter:
  # Ensure Material icons are included
  uses-material-design: true

  # Assets to be included in the app
  assets:
    - assetimage/

